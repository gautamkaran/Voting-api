services:
  voting-api:
    build: .
    restart: unless-stopped
    hostname: voting-api
    
    ports:
      - "3000"
    environment:
      PORT: ${PORT:-3000}
      MONGODB_URL: ${MONGODB_URL:-mongodb://mongodb:27017}
      CORS_ORIGIN: ${CORS_ORIGIN}
      VOTING_API_HOST_URL: ${VOTING_API_HOST_URL}
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET}
      ACCESS_TOKEN_EXPIRY: ${ACCESS_TOKEN_EXPIRY}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      REFRESH_TOKEN_EXPIRY: ${REFRESH_TOKEN_EXPIRY}
    depends_on:
      - mongodb
    networks:
      - voting-network

  mongodb:
    image: mongo:latest
    restart: unless-stopped
    hostname: mongodb
    volumes:
      - mongo-data:/data/db
    networks:
      - voting-network

volumes:
  mongo-data:

networks:
  voting-network:
    driver: bridge
